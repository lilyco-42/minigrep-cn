name: Release

# 1. 触发条件：推送v开头的标签（如v1.0.0）或手动触发
on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

# 2. 关键：授予创建 Release 的写入权限
permissions:
    contents: write

jobs:
    # 创建 Release 草稿并获取上传 URL
    create-release:
        runs-on: ubuntu-latest
        outputs:
            upload_url: ${{ steps.release.outputs.upload_url }}
        steps:
            - name: Create Release Draft
              id: release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  generate_release_notes: true

    # 多平台构建与上传
    build-and-upload:
        needs: create-release
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: minigrep
                      asset_name: minigrep-linux-x86_64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: minigrep.exe
                      asset_name: minigrep-windows-x86_64.exe
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_name: minigrep
                      asset_name: minigrep-macos-x86_64
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              run: rustup target add ${{ matrix.target }}

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Upload to Release
              uses: softprops/action-gh-release@v2
              with:
                  upload_url: ${{ needs.create-release.outputs.upload_url }}
                  files: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
