name: Release

on:
    push:
        tags:
            - "v*" # 当推送以 v 开头的标签时触发（例如 v1.0.0, v0.2.3-beta）
    workflow_dispatch: # 也允许手动触发（可选）

jobs:
    create-release:
        runs-on: ubuntu-latest
        outputs:
            upload_url: ${{ steps.create_release.outputs.upload_url }}
        steps:
            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  release_name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false

    build-and-upload:
        needs: create-release
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: minigrep-linux
                      asset_name: minigrep-linux-x86_64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: minigrep-windows.exe
                      asset_name: minigrep-windows-x86_64.exe
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_name: minigrep-macos
                      asset_name: minigrep-macos-x86_64
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              run: rustup target add ${{ matrix.target }}

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }}

            - name: Upload binary to release
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ needs.create-release.outputs.upload_url }}
                  asset_path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
                  asset_name: ${{ matrix.asset_name }}
                  asset_content_type: application/octet-stream
